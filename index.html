<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mutlu Yıllar ❤️</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Comic Sans MS', cursive;
}

body {
    cursor: url('bee.png'), auto;
}


    /* Arka plan videosu */
#bg-video{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}


/* BAŞLIK */
.title{
    text-align:center;
    font-size:42px;
    margin-top:20px;
    color:#c2185b;
    animation:pulse 2s infinite;
}
.subtitle{
    text-align:center;
    font-size:28px;
    color:#e91e63;
    animation:slide 3s infinite alternate;
}
@keyframes pulse{50%{transform:scale(1.05)}}
@keyframes slide{from{letter-spacing:2px}to{letter-spacing:5px}}

/* BUTONLAR */
.music-btn{
    position:fixed;
    top:15px;
    right:15px;
    padding:12px 22px;
    border-radius:30px;
    background:#e91e63;
    color:white;
    text-decoration:none;
    z-index:9999;
}

/*SLİDER*/
#volumeContainer {
    position: fixed;
    top: 70px; /* butonun hemen altına */
    right: 15px;
    display: flex;
    align-items: center;
    gap: 8px; /* emoji ile slider arası boşluk */
    z-index: 9999;
}

#volumeIcon {
    font-size: 20px; /* hoparlör boyutu */
}

#volumeSlider {
    width: 150px;
    -webkit-appearance: none;
    height: 6px;
    background: #e0e0e0;
    border-radius: 5px;
    outline: none;
}

/* Slider topu (thumb) pembe */
#volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: #e91e63;
    border-radius: 50%;
    cursor: pointer;
    border: none;
}

#volumeSlider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: #e91e63;
    border-radius: 50%;
    cursor: pointer;
    border: none;
}



.love-btn{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    padding:14px 28px;
    border-radius:35px;
    background:#ff4f8b;
    color:white;
    text-decoration:none;
    font-size:18px;
    animation:softPulse 3s infinite;
    z-index:9999;
}
@keyframes softPulse{
    50%{transform:translateX(-50%) scale(1.05)}
}

/* AĞAÇLAR */
.tree{
    position:fixed;
    bottom:0;
    font-size:200px;
}
.left{left:10px}
.right{right:10px}



/* Popup resim */
#popupImage{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    display:none;
    max-width:80%;
    max-height:80%;
    z-index:9999;
}



/* Ampuller */
.bulb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    animation: blink 1.2s infinite alternate;
}

/* ÜST */
.top-lights {
    position: fixed;
    top: 5px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
    z-index: 999999;
    pointer-events: none;
}

/* SOL - SAĞ */
.side {
    position: fixed;
    top: 30px;
    height: calc(100vh - 30px);
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    z-index: 999999;
    pointer-events: none;
}

.left { left: 5px; }
.right { right: 5px; }

/* Yanıp sönme */
@keyframes blink {
    0%   { opacity: 0.3; }
    100% { opacity: 1; }
}


/* NOEL BABA */
.santa{
    position:absolute;
    top:45%;
    left:-200px;
    font-size:90px;
    animation:fly 5s linear infinite;
    z-index:5;
    transform: scaleX(-1); /* yönü sağa çevirir */
}

.santa span{
    position:absolute;
}

/* 🦌 Geyikler */
.deer.top{
    left:0;
    top:-35px;   /* yukarı */
}

.deer.bottom{
    left:0;
    top:35px;    /* aşağı */
}

/* 🛷 Kızak – geyiklerin ortasında ve arkasında */
.sleigh{
    left:110px;  /* geyiklerin arkası */
    top:0;
}

/* 🎅 Noel Baba – kızağın üstünde */
.claus{
    left:135px;
    top:-40px;
    font-size:70px;
}

.claus img{
    width: 90px;      /* font-size ile birebir */
    height: auto;
    display: block;
}


@keyframes fly{
    0%{
        left:-200px;
        top:45%;
    }
    20%{
        top:30%;   /* daha yukarı */
    }
    50%{
        top:55%;   /* daha aşağı */
    }
    80%{
        top:35%;   /* tekrar yukarı */
    }
    100%{
        left:110%;
        top:45%;
    }
}


.star {
    position: absolute;
    font-size: 20px;
    color: gold;
    pointer-events: none;
    z-index: 4;
    animation: starFade 0.8s linear forwards;
}

@keyframes starFade {
    from {
        opacity: 1;
        transform: translateX(0) scale(1);
    }
    to {
        opacity: 0;
        transform: translateX(-15px) scale(0.4);
    }
}





/* KAR */
.snow{
    position:fixed;
    top:-10px;
    font-size:16px;
    animation:snowfall linear infinite;
    pointer-events:none;
}
@keyframes snowfall{
    to{transform:translateY(110vh)}
}

/* HEDİYELER */
.gift{
    position:absolute;
    font-size:65px;
    cursor:pointer;
    animation:burst 1.2s ease-out forwards;
    z-index:6;
}
@keyframes burst{
    to{
        transform:translate(var(--x), var(--y)) rotate(360deg);
    }
}

/* 💥 PATLAMA ANİMASYONU */
.explode{
    animation:explode .45s ease-out forwards;
}
@keyframes explode{
    0%{transform:scale(1)}
    60%{transform:scale(1.6) rotate(15deg)}
    100%{transform:scale(0); opacity:0}
}

/* KALPLER */
.heart{
    position:absolute;
    font-size:24px;
    animation:heartPop 1s ease-out forwards;
    pointer-events:none;
}
@keyframes heartPop{
    to{
        transform:translate(var(--x), -120px) scale(0);
        opacity:0;
    }
}



/*ARILAR*/
.beehive {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 50px;
    cursor: pointer;
    z-index: 1000;
}

.bee {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    transition: transform 7s linear, opacity 7s linear;
}




/* MESAJ */
.message{
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:28px 36px;
    border-radius:30px;
    font-size:24px;
    color:#e91e63;
    animation:pop .8s ease;
    z-index:99999;
    text-align:center;
    cursor:pointer; /* 👈 EKLENDİ */
}
@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0)}
    to{transform:translate(-50%,-50%) scale(1)}
}




</style>
</head>

<body>

<div class="title">🎄✨ Mutlu Yıllar Karıcım ✨🎄</div>
<div class="subtitle">💖 I LOVE YOU 💖</div>


<!-- Ortada çıkacak resim -->
<img id="popupImage" src="grinch.png" alt="Popup" />

<!-- Ses dosyası -->
<audio id="popupSound" src="haha.mp3"></audio>


<a class="music-btn"
   id="musicBtn"
   href="javascript:void(0)">
🎶 MÜZİĞİ BAŞLAT
</a>

<!-- Slider ve hoparlör emojisi -->
<div id="volumeContainer">
  <span id="volumeIcon">🔊</span>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>


<audio id="music" src="jingle.mp3"></audio>


<a class="love-btn"
   href="https://youtu.be/VsFivDV-SKU?si=vGae0ALXyj9VKMRd&t=69"
   target="_blank" rel="noopener noreferrer">
💖 NİCE YILLARA 💖
</a>

<div class="top-lights" id="top"></div>
<div class="side left" id="left"></div>
<div class="side right" id="right"></div>


<div class="beehive" id="beehive">🍯</div>

<a id="keyboardBtn" href="https://coplugum.github.io" target="_blank" style="position: fixed; top: 15px; left: 80px; font-size: 50px; text-decoration: none; z-index: 1000;">
  🖥️
</a>



<div class="tree left">🎄</div>
<div class="tree right">🎄</div>
<div class="santa" id="santa">
  <span class="deer top">🦌</span>
  <span class="deer bottom">🦌</span>
  <span class="sleigh">🛷</span>
  <span class="claus">
    <img src="santa.png" alt="Santa">
  </span>





<script>
const sleigh = document.querySelector(".sleigh");

setInterval(() => {
    const star = document.createElement("div");
    star.className = "star";
    star.innerText = ["✨","⭐","✦"][Math.floor(Math.random()*3)];

    const rect = sleigh.getBoundingClientRect();

    // Kızağın arkasına bırak
    star.style.left = rect.left - 5 + "px";
    star.style.top =
        rect.top + rect.height / 2 + (Math.random()*10 - 5) + "px";

    document.body.appendChild(star);

    // 50 salise sonra sil
    setTimeout(() => {
        star.remove();
    }, 800);

}, 70); // yıldız çıkma sıklığı


<video autoplay muted loop playsinline id="bg-video">
    <source src="background.mp4" type="video/mp4">
</video>

/*NOEL BABA*/
document.addEventListener("DOMContentLoaded", () => {
    const santa = document.querySelector(".santa");
    if (!santa) return;

    let offsetX = 0;
    let offsetY = 0;
    const speed = 20;

    document.addEventListener("keydown", (e) => {
        switch (e.key) {
            case "ArrowUp":
                offsetY -= speed;
                break;
            case "ArrowDown":
                offsetY += speed;
                break;
            case "ArrowLeft":
                offsetX += speed;   // scaleX(-1) yüzünden ters
                break;
            case "ArrowRight":
                offsetX -= speed;   // scaleX(-1) yüzünden ters
                break;
            default:
                return;
        }

        // CSS'teki transform BOZULMAZ
        santa.style.transform = `scaleX(-1) translate(${offsetX}px, ${offsetY}px)`;
    });
});



/*ARILAR*/
const beehive = document.getElementById('beehive');

/* 🎵 RASTGELE 2 ŞARKI */
const beeSounds = [
    new Audio('bal böceği1.mp3'),
    new Audio('bal böceği2.mp3'),
    new Audio('bal böceği3.mp3'),
    new Audio('bal böceği4.mp3'),
    new Audio('bal böceği5.mp3')
];

beeSounds.forEach(sound => sound.volume = 0.6);

beehive.addEventListener('click', () => {

    // Rastgele şarkı çal
    const randomSound = beeSounds[Math.floor(Math.random() * beeSounds.length)];
    randomSound.currentTime = 0;
    randomSound.play();

    const beesCount = 40;
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    for (let i = 0; i < beesCount; i++) {
        const bee = document.createElement('div');
        bee.className = 'bee';
        bee.textContent = '🐝';
        bee.style.left = `${beehive.offsetLeft + 15}px`;
        bee.style.top = `${beehive.offsetTop + 15}px`;
        document.body.appendChild(bee);

        // Kovandan merkeze temel yön + rastgele sapma
        const deltaX = (centerX - beehive.offsetLeft) + (Math.random() * 200 - 100); 
        const deltaY = (centerY - beehive.offsetTop) + (Math.random() * 200 - 100);

        setTimeout(() => {
            bee.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            bee.style.opacity = '0';
        }, 50);

        // 7 saniye sonra arıyı kaldır
        setTimeout(() => {
            bee.remove();
        }, 7000);
    }
});


/*GRİNCH*/
const trees = document.querySelectorAll('.tree');
const popupImage = document.getElementById('popupImage');
const popupSound = document.getElementById('popupSound');

trees.forEach(tree => {
    tree.addEventListener('click', () => {
        // Resmi göster
        popupImage.style.display = 'block';
        // Ses çal
        popupSound.currentTime = 0;
        popupSound.play();
        // 8 saniye sonra resmi gizle
        setTimeout(() => {
            popupImage.style.display = 'none';
        }, 8000);
    });
});




/*IŞIK*/
const colors = ["red", "yellow", "lime", "cyan", "orange", "magenta"];

function addBulbs(id, count) {
    const el = document.getElementById(id);
    for (let i = 0; i < count; i++) {
        const b = document.createElement("div");
        b.className = "bulb";
        b.style.background = colors[Math.floor(Math.random() * colors.length)];
        b.style.animationDuration = (0.5 + Math.random() * 1.5) + "s";
        el.appendChild(b);
    }
}

addBulbs("top", 35);
addBulbs("left", 22);
addBulbs("right", 22);


/*ŞARKI*/
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");
const slider = document.getElementById("volumeSlider");

// Müzik başlat/durdur
btn.addEventListener("click", (e) => {
  e.preventDefault();

  if (music.paused) {
    music.play();
    btn.textContent = "⏸ MÜZİĞİ DURDUR";
  } else {
    music.pause();
    btn.textContent = "🎶 MÜZİĞİ BAŞLAT";
  }
});

// Slider ile ses kontrolü
slider.addEventListener("input", (e) => {
  music.volume = e.target.value;
});



/* KAR */
setInterval(()=>{
    const s=document.createElement("div");
    s.className="snow";
    s.innerText="❄️";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.animationDuration=1+Math.random()*1.5+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),4000);
},35);

/* MESAJLAR */
const messages=[
  { img: "foto1.jpg" },
  { img: "foto3.jpg" },
  { img: "foto4.jpg" },
  { img: "foto5.jpg" },
  { img: "foto6.jpg" },
  { img: "foto7.jpg" },
  { img: "foto8.jpg" },

  "💖 Seni seviyorum güzel karım 💖",
  "🐣 Dalin kokulu civcivim karım 🐣",
  "🍓 Çilek kokulu petitolu bebeğim 🍓",
  "🔥 Hatunum 🔥",
  "💞 Yavrum 💞",
  "💍 Kocasının karısı 💍",
  "🍊 Mandalina yanaklı penguenim 🐧",
  "🐼 Bal dudaklı pandam 🐼",
  "🐝 Bal böceğim 🐝",
  "💘 Balım 💘",
  "🎧🎶 Seyyar oldum dolaştım seyyar oldum dolaştımmmmmmmm🎵🕺",

  "🌌🍓 Kalbimin yörüngesine yerleşmiş, çilek kokulu küçük yıldızım ✨",
  "🍌💫 Gülüşü muz kadar tatlı, ruhu galaksi kadar geniş minnoşum 🌌",
  "🌞🪐 Saçlarında yaz, kalbinde gezegenler saklayan benim güzelim 💖",
  "🌙🍦 Yanıma gelince evreni durduran, vanilya kokulu minik ayım ✨",
  "🍒🐰 Kalbimde yuva yapmış, kiraz tadında sevimli tavşanım 💞",
  "✨🐱 Ruhuma sarılan, yıldız tozu serpilmiş uykucu kedim 🌙",
  "🪐🥛 Gözlerinde gezegenler dönen, çilekli süt kadar yumuşak canım 💕",
  "🌸🧸 Kalbimin bahçesinde dolaşan, mis kokulu minik ayıcığım 💖",
  "🌌🍰 Evren bana seni saklamış gibi, muzlu kek tadında mutluluğum ✨",
  "🦊💫 Yıldızların bile kıskandığı, narin kalpli küçük tilkim 💞",
  "🌙🍓 Gecemi aydınlatan, kalbime çilek kokusu bırakan minik yıldızım ✨",
  "🪐🍯 Ruhuma bal sürülmüş gibi iyi gelen, galaksim benim 💖",
  "🌸🐣 Kalbimin en sıcak köşesinde uyuyan, pamuk civcivim 💞",
  "✨🍰 Gülüşüyle evreni şekerlemeye çeviren tatlı mucizem 🌌",
  "🦋🌞 Yanımdayken zamanı unutturan, güneşli kelebeğim 💕",
  "🌙🧁 Gecelerimi yumuşacık yapan, vanilya kokulu düşüm ✨",
  "🪐🍒 Kalbimde iz bırakan, kiraz tadında güzelim 💖",
  "🐱🌸 Ruhuma mırlayan, mis kokulu uykucu kedim 💞",
  "🌌🍯 Evrenin bana attığı en tatlı sürprizimsin balım ✨",
  "🦊💫 Gülüşüyle yıldızları utandıran, zarif kalpli tilkim 💕"
];

const gifts=["🎁","🧸"];
const piles={};

const santa=document.getElementById("santa");
santa.onclick=()=>{
    const r=santa.getBoundingClientRect();
    for(let i=0;i<6;i++){
        const g=document.createElement("div");
        g.className="gift";
        g.innerText=gifts[Math.floor(Math.random()*gifts.length)];

        const startX=r.left+r.width/2;
        const startY=r.top+r.height/2;
        g.style.left=startX+"px";
        g.style.top=startY+"px";

        const landX=Math.floor(Math.random()*(window.innerWidth-100)+50);
        if(!piles[landX]) piles[landX]=0;
        const landY=window.innerHeight-140-piles[landX];
        piles[landX]+=40;

        g.style.setProperty("--x",(landX-startX)+"px");
        g.style.setProperty("--y",(landY-startY)+"px");

        g.onclick=(e)=>{
            e.stopPropagation();

            const m=document.createElement("div");
            m.className="message";

            const msg = messages[Math.floor(Math.random()*messages.length)];

            if(typeof msg === "string"){
                m.innerText = msg;
            }else if(msg.img){
                const img=document.createElement("img");
                img.src=msg.img;
                img.style.maxWidth="320px";
                img.style.borderRadius="20px";
                img.style.display="block";
                m.appendChild(img);
            }

            m.onclick=()=>m.remove(); // 👈 TIKLAYINCA KAPANIR
            document.body.appendChild(m);

            g.classList.add("explode");      // 💥 patlama
            setTimeout(()=>g.remove(),450); // 🗑️ sil
        };

        document.body.appendChild(g);
    }
};

/* BOŞ ALANA TIKLAYINCA KALP */
document.addEventListener("click",(e)=>{
    const hearts=["❤️","💖","💘","💕","💗","💜","💙","💚","🧡"];
    for(let i=0;i<6;i++){
        const h=document.createElement("div");
        h.className="heart";
        h.innerText=hearts[Math.floor(Math.random()*hearts.length)];
        h.style.left=e.clientX+"px";
        h.style.top=e.clientY+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),2500);
    }
});
</script>

</body>
</html>
